name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
assignees: ["westshgit"]

body:

- type: markdown
  attributes:
    value: "## Thanks for reporting a bug! Please help us reproduce and fix it by filling out the details below."

- type: textarea
  id: version
  attributes:
    label: Project Version
    placeholder: e.g., v0.1.0
  validations:
    required: true

- type: textarea
  id: what-happened
  attributes:
    label: What Happened?
    description: A clear description of what went wrong.
    placeholder: Describe the bug...
  validations:
    required: true

- type: textarea
  id: steps
  attributes:
    label: Steps to Reproduce
    description: How can we reproduce the bug?
    placeholder: |
      1. Go to '...'
      2. Click on '...'
      3. See error
  validations:
    required: true

- type: textarea
  id: logs
  attributes:
    label: Logs or Screenshots
    description: Paste any relevant logs or screenshots here.
    placeholder: Drag and drop screenshots or copy logs
  validations:
    required: false

- type: dropdown
  id: priority
  attributes:
    label: Priority
    options:
      - Low
      - Medium
      - High
    default: 1
